<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>unhinged fruit salad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;500;600&display=swap');

  :root{
    --cream:#FFF8EC;
    --pink:#FF9EC4;
    --pink-deep:#F76FA8;
    --mint:#A8E6CE;
    --butter:#FFE08A;
    --lavender:#C9B6F2;
    --plum:#2A2140;
    --plum-soft:#B9AEDB;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ height:100%; overscroll-behavior:none; }

  body{
    margin:0;
    font-family:'Quicksand', sans-serif;
    color:#2A2140;
    overflow:hidden;
    position:relative;
    background:#0b1a3a;
  }

  /* ---------- Van Gogh Starry Night background ---------- */
  #skyBg{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background-image:url('assets/starry-night-bg.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    transition:transform 0.25s ease-out;
    will-change:transform;
  }
  #skyBg:after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(6,10,25,0.25) 0%, rgba(6,10,25,0.05) 30%, rgba(6,10,25,0.15) 70%, rgba(6,10,25,0.45) 100%);
  }
  .swirl{
    position:absolute;
    border-radius:50%;
    background:conic-gradient(from 90deg, rgba(140,180,255,0.28), rgba(30,50,110,0) 22%, rgba(255,224,138,0.16) 42%, rgba(30,50,110,0) 62%, rgba(140,180,255,0.22) 80%, rgba(30,50,110,0) 100%);
    filter:blur(3px);
    animation:rotateSlow 100s linear infinite;
    opacity:0.85;
  }
  .swirl.s1{ width:1100px; height:1100px; top:-380px; left:-320px; }
  .swirl.s2{ width:800px; height:800px; top:20%; right:-260px; animation-duration:130s; animation-direction:reverse; }
  .swirl.s3{ width:620px; height:620px; bottom:-220px; left:15%; animation-duration:150s; }
  @keyframes rotateSlow{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .cypress{
    position:absolute; left:4%; bottom:0; width:11%; height:62%;
    background:linear-gradient(180deg, #0a1530, #060c1e);
    clip-path:polygon(50% 0%, 62% 8%, 48% 14%, 66% 22%, 45% 28%, 68% 36%, 50% 42%, 70% 50%, 48% 58%, 65% 66%, 52% 74%, 60% 100%, 40% 100%, 48% 74%, 35% 66%, 52% 58%, 30% 50%, 50% 42%, 32% 36%, 55% 28%, 34% 22%, 52% 14%, 38% 8%);
    filter:blur(0.5px);
    opacity:0.9;
  }

  .star{ position:absolute; border-radius:50%; background:#FFF3C4; box-shadow:0 0 8px 2px rgba(255,224,138,0.8); animation:twinkle 3s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* ---------- header ---------- */
  .headerBar{
    position:fixed; top:0; left:0; right:0; z-index:4;
    padding:14px 16px 8px;
    text-align:center;
    pointer-events:none;
  }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-size:1.25rem;
    font-weight:800;
    margin:0;
    color:#FFE9B0;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
  }
  .subtitle{
    font-size:0.72rem;
    color:#D8CFF0;
    margin:2px 0 0;
    text-shadow:0 1px 4px rgba(0,0,0,0.5);
  }

  /* ---------- stage (full screen) ---------- */
  .stage{
    position:fixed;
    inset:0;
    z-index:1;
    touch-action:none;
  }

  .fruit-pos{
    position:absolute;
    width:110px; height:110px;
    top:0; left:0;
    will-change:transform, opacity;
    cursor:grab;
    z-index:2;
    opacity:0;
    transition:opacity 0.5s ease;
  }
  .fruit-pos.visible{ opacity:1; }
  .fruit-pos.dragging{ cursor:grabbing; z-index:5; }

  .fruit-actor{
    width:100%; height:100%;
    transform-origin:center bottom;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  .fruit-actor img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,0.25));
  }

  /* action animation library */
  .anim-squish{ animation:aSquish 0.7s ease !important; }
  @keyframes aSquish{ 0%{transform:scale(1,1);} 30%{transform:scale(1.25,0.6) rotate(-2deg);} 55%{transform:scale(0.85,1.2) rotate(2deg);} 100%{transform:scale(1,1);} }

  .anim-wobble{ animation:aWobble 0.9s ease !important; }
  @keyframes aWobble{ 0%,100%{transform:rotate(0deg);} 25%{transform:rotate(-14deg);} 60%{transform:rotate(10deg);} 80%{transform:rotate(-4deg);} }

  .anim-flop{ animation:aFlop 1s ease !important; }
  @keyframes aFlop{ 0%{transform:rotate(0deg) translateY(0);} 40%,70%{transform:rotate(80deg) translateY(14px) scaleY(0.7);} 100%{transform:rotate(0deg) translateY(0);} }

  .anim-faint{ animation:aFaint 1.1s ease !important; }
  @keyframes aFaint{ 0%{transform:rotate(0deg) translateY(0);} 45%,70%{transform:rotate(-20deg) translateY(10px);} 100%{transform:rotate(0deg) translateY(0);} }

  .anim-spin{ animation:aSpin 0.8s cubic-bezier(.3,0,.4,1) !important; }
  @keyframes aSpin{ 0%{transform:rotate(0deg);} 85%{transform:rotate(760deg);} 100%{transform:rotate(730deg);} }

  .anim-flex{ animation:aFlex 0.7s ease !important; }
  @keyframes aFlex{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.22);} }

  .anim-sway{ animation:aSway 1.4s ease-in-out !important; }
  @keyframes aSway{ 0%,100%{transform:rotate(0deg);} 25%{transform:rotate(-16deg);} 50%{transform:rotate(0deg);} 75%{transform:rotate(16deg);} }

  .anim-dip{ animation:aDip 1.5s ease !important; }
  @keyframes aDip{ 0%{transform:rotate(0deg) translateY(0);} 30%{transform:rotate(-10deg) translateY(-8px);} 55%{transform:rotate(8deg) translateY(8px);} 100%{transform:rotate(0deg) translateY(0);} }

  .anim-robot{ animation:aRobot 1.2s steps(6) !important; }
  @keyframes aRobot{ 0%{transform:translateX(0) rotate(0deg);} 20%{transform:translateX(-8px) rotate(-4deg);} 40%{transform:translateX(8px) rotate(4deg);} 60%{transform:translateX(-6px) rotate(-3deg);} 80%{transform:translateX(6px) rotate(3deg);} 100%{transform:translateX(0) rotate(0deg);} }

  .anim-worm{ animation:aWorm 1s ease !important; }
  @keyframes aWorm{ 0%{transform:scaleX(1) translateY(0);} 40%,70%{transform:scaleX(1.3) translateY(8px) scaleY(0.75);} 100%{transform:scaleX(1) translateY(0);} }

  .anim-buildup{ animation:aBuildup 1.6s ease !important; }
  @keyframes aBuildup{ 0%,100%{transform:scale(1) rotate(0deg);} 40%{transform:scale(1);} 60%{transform:scale(1.08);} 80%{transform:scale(1) rotate(360deg);} }

  .anim-sad{ animation:aSad 2s ease-in-out !important; }
  @keyframes aSad{ 0%,100%{transform:rotate(0deg) translateY(0);} 50%{transform:rotate(6deg) translateY(6px);} }

  .anim-glitch{ animation:aGlitch 0.5s steps(2,end) !important; }
  @keyframes aGlitch{ 0%{transform:translate(0,0) rotate(0deg);} 25%{transform:translate(-4px,2px) rotate(-3deg);} 50%{transform:translate(4px,-2px) rotate(3deg);} 75%{transform:translate(-3px,0) rotate(-2deg);} 100%{transform:translate(0,0) rotate(0deg);} }

  .anim-lean{ animation:aLean 1s ease !important; }
  @keyframes aLean{ 0%,100%{transform:scale(1) translateY(0);} 50%{transform:scale(1.15) translateY(-6px);} }

  .anim-panic{ animation:aPanic 0.6s ease !important; }
  @keyframes aPanic{ 0%,100%{transform:translate(0,0) rotate(0deg) scale(1);} 20%{transform:translate(-10px,-8px) rotate(-10deg) scale(1.1);} 40%{transform:translate(10px,-4px) rotate(10deg) scale(1.1);} 60%{transform:translate(-6px,-6px) rotate(-6deg);} 80%{transform:translate(4px,0) rotate(4deg);} }

  .anim-victory{ animation:aVictory 1.3s ease !important; }
  @keyframes aVictory{ 0%{transform:translate(0,0) rotate(0deg);} 25%{transform:translate(40px,-16px) rotate(90deg);} 50%{transform:translate(0,-24px) rotate(180deg);} 75%{transform:translate(-40px,-16px) rotate(270deg);} 100%{transform:translate(0,0) rotate(360deg);} }

  .anim-poke{ animation:aPoke 0.4s ease !important; }
  @keyframes aPoke{ 0%,100%{transform:scale(1) rotate(0deg);} 40%{transform:scale(0.8,1.2) rotate(-8deg);} 70%{transform:scale(1.1,0.9) rotate(6deg);} }

  /* ---------- chat (fixed bottom drawer) ---------- */
  .chatPanel{
    position:fixed; left:0; right:0; bottom:0; z-index:4;
    background:rgba(20,20,35,0.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-top:1px solid rgba(255,255,255,0.15);
    border-radius:20px 20px 0 0;
    padding:10px 14px calc(12px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 30px rgba(0,0,0,0.35);
  }
  .chatLog{
    max-height:110px;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:6px;
    padding-right:4px;
    margin-bottom:6px;
  }
  .chatLog::-webkit-scrollbar{ width:6px; }
  .chatLog::-webkit-scrollbar-thumb{ background:var(--lavender); border-radius:10px; }

  .bubble{ max-width:78%; padding:7px 12px; border-radius:15px; font-size:0.83rem; line-height:1.3; }
  .bubble.her{ align-self:flex-end; background:var(--lavender); border-bottom-right-radius:4px; color:#2A2140; }
  .bubble.fruit{ align-self:flex-start; background:var(--mint); border-bottom-left-radius:4px; font-family:'Baloo 2', sans-serif; font-weight:600; color:#1c3a2c; }

  .inputRow{ display:flex; gap:8px; }
  input[type=text]{
    flex:1; font-family:'Quicksand', sans-serif; font-size:0.9rem;
    padding:11px 14px; border-radius:13px; border:none; outline:none; background:rgba(255,255,255,0.92);
  }

  button{
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:0.88rem;
    border:none; border-radius:13px; padding:10px 15px; cursor:pointer;
    color:var(--plum); background:var(--pink); box-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  button:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,0.25); }

  .typing{ font-size:0.7rem; color:#D8CFF0; text-align:center; height:14px; margin-bottom:2px; }

  @media (max-width:420px){
    .fruit-pos{ width:82px; height:82px; }
    .vangogh-pos{ width:140px; height:180px; }
    .chatLog{ max-height:90px; }
    .quickReplies{ font-size:0.72rem; }
  }

  /* ---------- van gogh ---------- */
  .vangogh-pos{
    position:absolute;
    width:190px; height:244px;
    z-index:3;
    pointer-events:auto;
    cursor:grab;
    will-change:transform;
  }
  .vangogh-pos.dragging{ cursor:grabbing; z-index:5; }
  .vangogh-pos img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
    filter:drop-shadow(0 4px 5px rgba(0,0,0,0.3));
  }
  .vangogh-pos.bob{ animation:vgBob 3.2s ease-in-out infinite; }
  @keyframes vgBob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
  .vangogh-pos.flinch{ animation:vgFlinch 0.5s ease !important; }
  @keyframes vgFlinch{ 0%,100%{transform:translate(0,0) rotate(0deg);} 30%{transform:translate(-6px,-4px) rotate(-6deg);} 60%{transform:translate(5px,-2px) rotate(5deg);} }
  .vangogh-pos.talk .vg-inner{ animation:vgTalk 0.5s ease infinite; }
  @keyframes vgTalk{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }

  .vg-bubble{
    position:absolute;
    bottom:100%; left:50%; transform:translateX(-50%);
    margin-bottom:12px;
    min-width:160px; max-width:260px;
    background:#fff; border:4px solid var(--plum); border-radius:18px;
    padding:10px 16px;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:1rem; line-height:1.3;
    text-align:center;
    box-shadow:4px 4px 0 var(--plum);
    opacity:0; pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s ease;
    z-index:7;
  }
  .vg-bubble.show{ opacity:1; }
  .vg-bubble:after{
    content:'🎨';
    position:absolute; top:-14px; left:-10px;
    font-size:1.1rem;
  }

  /* per-fruit speech bubble */
  .fruit-bubble{
    position:absolute;
    bottom:100%; left:50%; transform:translateX(-50%);
    margin-bottom:8px;
    min-width:100px; max-width:170px;
    background:#fff; border:3px solid var(--plum); border-radius:14px;
    padding:6px 11px;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:0.76rem; line-height:1.25;
    text-align:center;
    box-shadow:3px 3px 0 var(--plum);
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease;
    z-index:6;
    white-space:normal;
  }
  .fruit-bubble.show{ opacity:1; }

  /* ---------- top-corner UI ---------- */
  #soundToggle{
    position:fixed; top:12px; left:12px; z-index:8;
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,20,35,0.55); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.2);
    color:#FFE9B0; font-size:1.1rem; cursor:pointer;
    box-shadow:none; padding:0;
  }
  #soundToggle:active{ transform:none; box-shadow:none; }

  #chaosMeterWrap{
    position:fixed; top:12px; right:12px; z-index:8;
    background:rgba(20,20,35,0.55); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:12px;
    padding:6px 10px;
    width:120px;
  }
  #chaosLabel{
    font-family:'Baloo 2', sans-serif; font-size:0.62rem; font-weight:700;
    color:#FFE9B0; letter-spacing:0.05em; margin-bottom:4px; text-align:center;
  }
  #chaosBarTrack{
    height:7px; border-radius:6px; background:rgba(255,255,255,0.2); overflow:hidden;
  }
  #chaosBarFill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--mint), var(--butter), var(--pink));
    transition:width 0.4s ease;
  }

  /* ---------- quick replies ---------- */
  .quickReplies{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:2px;
    scrollbar-width:none;
  }
  .quickReplies::-webkit-scrollbar{ display:none; }
  .qr-btn{
    flex:0 0 auto;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:0.76rem;
    padding:7px 12px; border-radius:20px; border:none; cursor:pointer;
    background:rgba(255,255,255,0.85); color:var(--plum);
    box-shadow:0 2px 0 rgba(0,0,0,0.2);
    white-space:nowrap;
  }
  .qr-btn:active{ transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div id="skyBg"></div>

<button id="soundToggle" title="toggle ambient sound">🔇</button>
<div id="chaosMeterWrap">
  <div id="chaosLabel">CHAOS METER</div>
  <div id="chaosBarTrack"><div id="chaosBarFill"></div></div>
</div>

<div class="headerBar">
  <h1>unhinged fruit salad</h1>
  <p class="subtitle">poke them, drag them, talk to them</p>
</div>

<div class="stage" id="stage"></div>

<div class="chatPanel">
  <div class="typing" id="typingIndicator"></div>
  <div class="chatLog" id="chatLog"></div>
  <div class="quickReplies" id="quickReplies"></div>
  <div class="inputRow">
    <input type="text" id="msgInput" placeholder="say something...">
    <button id="sendBtn">send</button>
  </div>
</div>

<script>
/* =====================================================================
   PERSONAL CONTENT — fill in / adjust as you like.
   ===================================================================== */
const HER_NAME = "Rhiannon";

const FIRST_GREETINGS = [
  "Hey dumbass, what's up?",
  "oh great, it's you. hi bitch.", "HEY BITCHASS, WHATCHU DOING", "heyyyy pineapple, you should smile sometime:)", "Yes fucktard, what now?", "I call you dumbass a lot, Don't let that forget you have a cute one too", "You're on my mind, I'm on your nerves...Perfect."
  // 👉 add as many greetings as you want, one gets picked at random
];

const WELCOME_BACK_LINES = [
  `oh it's you again, ${HER_NAME}. missed us?`,
  `back for more chaos, ${HER_NAME}?`,
  `you're back. we did not clean up while you were gone.`,
  `Welcome back dumbass`,
  `Well Well Well Motherfucker (read it in Samuel L. Jackson's voice)`
];

// Fallback lines if the API call fails or isn't wired up yet. Keep these SASSY.
const FALLBACK_LINES = [
  `my brain isn't loading but the sass generator never goes down, ${HER_NAME}.`,
  `system's down, ${HER_NAME}, but I still have opinions about your choices.`,
  `I'd say something smart but I'm a fruit, so, no. try again.`,
  `bold of you to expect a real answer right now.`
];

// The easter egg that unlocks after enough pokes. Edit freely.
const EASTER_EGG_THRESHOLD = 7;
const EASTER_EGG_MESSAGE = `okay ${HER_NAME}, we see you. that's ${EASTER_EGG_THRESHOLD} pokes. we're not mad, we're just... noting it.`;

/* =====================================================================
   THE CAST — each fruit has its own personality: which actions it favors,
   what it says when poked, and its base vibe.
   ===================================================================== */
const ANIMS = ["anim-squish","anim-wobble","anim-flop","anim-faint","anim-spin","anim-flex",
  "anim-sway","anim-dip","anim-robot","anim-worm","anim-buildup","anim-sad","anim-glitch",
  "anim-lean","anim-panic","anim-victory"];

const CAST = [
  {
    id:"pineapple", img:"assets/pineapple.png",
    weightedActions:["anim-spin","anim-victory","anim-panic","anim-buildup","anim-glitch"],
    idleLines:[
      "I RAN HERE FOR NO REASON AND I'D DO IT AGAIN",
      "I have several emotions and all of them are loud",
      "spiky on the outside, spiky on the inside too actually",
      "not to be dramatic but I could destroy you in an argument",
      "I run this fruit bowl and everyone knows it"
    ],
    pokeLines:["WHO TOUCHED ME", "okay but why does that feel nice actually", "I'm calling my lawyer (I don't have one)", "bold move for someone who can't even peel me"]
  },
  {
    id:"melon", img:"assets/melon.png",
    weightedActions:["anim-sad","anim-lean","anim-flop","anim-sway"],
    idleLines:[
      "I've seen things",
      "everyone's running around and I simply will not be participating",
      "I'm not tired, I'm just built like this",
      "your other tabs are more interesting than this, probably",
      "I'd roast you but I don't want to exert myself"
    ],
    pokeLines:["...why", "I felt that in my rind", "was that necessary", "you have the attention span of a goldfish and it shows"]
  },
  {
    id:"peach", img:"assets/peach.png",
    weightedActions:["anim-dip","anim-buildup","anim-lean","anim-victory"],
    idleLines:[
      "everything's fine here, nothing to see, why are you looking at me like that",
      "I would never do anything wrong :)",
      `I think about you and then I think about other things too, mostly you though`,
      "I'm sweet until you disappoint me, then it's over",
      "cute exterior, unhinged interior, learn the difference"
    ],
    pokeLines:["oh?? okay??", "you can't just touch a peach and expect nothing to happen", "hehe. hehehe. anyway.", "I'll allow it this once"]
  },
  {
    id:"banana", img:"assets/banana.png",
    weightedActions:["anim-panic","anim-glitch","anim-wobble","anim-faint"],
    idleLines:[
      "IS THIS NORMAL. IS THIS A NORMAL AMOUNT OF EXISTING",
      "I saw a shadow and now I have to lie down",
      "everything is fine I am simply vibrating",
      "I have a bad feeling about today and every day honestly",
      "someone check on me. no reason. just do it"
    ],
    pokeLines:["AH — okay — hi — sorry — hi", "my heart cannot take this", "I need a minute. several minutes.", "was THAT called for??"]
  },
  {
    id:"strawberry", img:"assets/strawberry.png",
    weightedActions:["anim-squish","anim-spin","anim-panic","anim-flex"],
    idleLines:[
      "I could take any of these fruits in a fight and I will not be explaining why I think that",
      "small but I contain multitudes (rage, mostly)",
      "who's talking. was someone talking. I'll fight them too",
      "I peaked in a way none of you will ever understand",
      "say something. I dare you. I'm BEGGING you"
    ],
    pokeLines:["EXCUSE ME", "wanna go?? WANNA GO??", "okay that one was kind of fair", "you just unlocked beef with me, congrats"]
  },
  {
    id:"grape", img:"assets/grape.png",
    weightedActions:["anim-worm","anim-glitch","anim-robot","anim-panic","anim-spin"],
    idleLines:[
      "AAAAAA no reason just felt like screaming",
      "I crawled here on purpose I want that on record",
      "no thoughts just vibes and also mild chaos",
      "I don't have a personality I just have volume",
      "someone's about to get roasted and it might be you"
    ],
    pokeLines:["AAAAA", "again. do it again.", "*incomprehensible screaming*", "I felt that in my whole vine"]
  }
];

const ROAST_LINES = [
  `you're a mess but you're OUR mess, ${HER_NAME}.`,
  "absolute menace behavior, ten out of ten, no notes.",
  `honestly ${HER_NAME}, bold of you to show up expecting kindness.`,
  "we love you but we are legally required to roast you first."
  // 👉 add more of your real inside-joke / roast lines here
];

// Preset quick-reply buttons shown above the chat input.
const QUICK_REPLIES = [
  "roast me",
  "say something dumb",
  "compliment me (rare)",
  "what are you all doing",
  "defend yourself"
];

/* ---------- Van Gogh: the resident painter ---------- */
const VANGOGH = {
  painting: "assets/vangogh-painting.png",
  staring: "assets/vangogh-staring.png",
  splat: "assets/vangogh-splat.png",
  beret: "assets/vangogh-beret.png",
  idleLines:[

let history = [];

function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ---------- interaction tracking: chaos meter + easter egg ---------- */
let totalPokes = 0;
let chaosLevel = 0;
const chaosFill = document.getElementById('chaosBarFill');

function registerInteraction(amount){
  totalPokes++;
  chaosLevel = Math.min(100, chaosLevel + amount);
  updateChaosDisplay();
  checkEasterEgg();
  playPokeSound();
}

function updateChaosDisplay(){
  chaosFill.style.width = chaosLevel + '%';
  if(chaosLevel >= 100) triggerChaosPeak();
}

setInterval(()=>{
  if(chaosLevel > 0){
    chaosLevel = Math.max(0, chaosLevel - 1);
    updateChaosDisplay();
  }
}, 1500);

let chaosPeakOnCooldown = false;
function triggerChaosPeak(){
  if(chaosPeakOnCooldown) return;
  chaosPeakOnCooldown = true;
  fruits.filter(f=>f.active).forEach(f => f.playAnim(randomFrom(ANIMS)));
  painter.flinch();
  chaosLevel = 40;
  updateChaosDisplay();
  setTimeout(()=>{ chaosPeakOnCooldown = false; }, 6000);
}

function checkEasterEgg(){
  if(totalPokes < EASTER_EGG_THRESHOLD) return;
  try{ if(localStorage.getItem('fruit_salad_easter_unlocked') === '1') return; }catch(e){}
  try{ localStorage.setItem('fruit_salad_easter_unlocked', '1'); }catch(e){}
  painter.say(EASTER_EGG_MESSAGE, 5000);
  fruits.filter(f=>f.active).forEach((f,i)=>{
    setTimeout(()=>{ f.playAnim('anim-victory'); f.say("😳", 2000); }, i*200);
  });
}

/* ---------- ambient sound (Web Audio, no external files) ---------- */
let audioCtx = null;
let ambientNodes = null;
let soundOn = false;
const soundBtn = document.getElementById('soundToggle');

function startAmbient(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const now = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.value = 0.05;
  master.connect(audioCtx.destination);

  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = 110;
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine'; osc2.frequency.value = 164.8;
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.08;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.02;
  lfo.connect(lfoGain); lfoGain.connect(master.gain);

  osc1.connect(master); osc2.connect(master);
  osc1.start(); osc2.start(); lfo.start();
  ambientNodes = { osc1, osc2, lfo, master };
}

function stopAmbient(){
  if(!ambientNodes) return;
  Object.values(ambientNodes).forEach(n => { try{ n.stop && n.stop(); n.disconnect(); }catch(e){} });
  ambientNodes = null;
}

function playPokeSound(){
  if(!soundOn || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 300 + Math.random()*200;
  gain.gain.value = 0.06;
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.stop(audioCtx.currentTime + 0.16);
}

soundBtn.addEventListener('click', ()=>{
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if(soundOn) startAmbient(); else stopAmbient();
});

/* ---------- subtle parallax on mouse move ---------- */

/* ---------- build fruit entities ---------- */
const stageW = ()=>stage.clientWidth;
const stageH = ()=>stage.clientHeight;
const TOP_SAFE = 76;
const BOTTOM_SAFE = 168;

class Fruit{
  constructor(data, index){
    this.data = data;
    this.el = document.createElement('div');
    this.el.className = 'fruit-pos';
    this.actor = document.createElement('div');
    this.actor.className = 'fruit-actor';
    const img = document.createElement('img');
    img.src = data.img;
    img.draggable = false;
    this.actor.appendChild(img);
    this.el.appendChild(this.actor);

    this.bubble = document.createElement('div');
    this.bubble.className = 'fruit-bubble';
    this.el.appendChild(this.bubble);
    this.bubbleTimer = null;

    stage.appendChild(this.el);

    this.x = 20 + Math.random()*Math.max(1, stageW()-84);
    this.y = TOP_SAFE + Math.random()*Math.max(1, stageH()-BOTTOM_SAFE-TOP_SAFE-64);
    this.vx = (Math.random()-0.5) * 0.15;
    this.vy = (Math.random()-0.5) * 0.15;
    this.dragging = false;
    this.lastAnimAt = 0;
    this.nextDirChange = performance.now() + 1000 + Math.random()*2000;
    this.nextIdleBeat = performance.now() + 3000 + Math.random()*4000;

    // rotating cast state — starts hidden/inactive; scheduler brings it onstage
    this.active = false;
    this.el.style.pointerEvents = 'none';

    this.bindEvents();
    this.render();
  }

  say(text, ms=4500){
    this.bubble.textContent = text;
    this.bubble.classList.add('show');
    clearTimeout(this.bubbleTimer);
    this.bubbleTimer = setTimeout(()=>{ this.bubble.classList.remove('show'); }, ms);
  }

  enter(){
    this.active = true;
    this.el.style.pointerEvents = 'auto';
    this.el.classList.add('visible');
    this.x = 20 + Math.random()*Math.max(1, stageW()-84);
    this.y = TOP_SAFE + Math.random()*Math.max(1, stageH()-BOTTOM_SAFE-TOP_SAFE-64);
    this.vx = (Math.random()-0.5) * 0.15;
    this.vy = (Math.random()-0.5) * 0.15;
    this.render();
    if(Math.random() < 0.8) this.say(randomFrom(this.data.idleLines));
  }

  exit(){
    this.active = false;
    this.el.style.pointerEvents = 'none';
    this.el.classList.remove('visible');
  }

  bindEvents(){
    let downX=0, downY=0, moved=false, offsetX=0, offsetY=0;

    this.el.addEventListener('pointerdown', (e)=>{
      this.el.setPointerCapture(e.pointerId);
      this.dragging = true;
      moved = false;
      this.el.classList.add('dragging');
      const rect = stage.getBoundingClientRect();
      downX = e.clientX; downY = e.clientY;
      offsetX = e.clientX - rect.left - this.x;
      offsetY = e.clientY - rect.top - this.y;
    });

    this.el.addEventListener('pointermove', (e)=>{
      if(!this.dragging) return;
      if(Math.abs(e.clientX-downX) > 4 || Math.abs(e.clientY-downY) > 4) moved = true;
      const rect = stage.getBoundingClientRect();
      this.x = clamp(e.clientX - rect.left - offsetX, 0, stageW()-this.el.offsetWidth);
      this.y = clamp(e.clientY - rect.top - offsetY, 0, stageH()-this.el.offsetHeight);
      this.render();
    });

    const endDrag = (e)=>{
      if(!this.dragging) return;
      this.dragging = false;
      this.el.classList.remove('dragging');
      if(!moved){
        this.poke();
      } else {
        this.playAnim(randomFrom(["anim-flop","anim-wobble","anim-squish"]));
        this.say(randomFrom(this.data.pokeLines));
        this.vx = (Math.random()-0.5) * 0.15;
        this.vy = (Math.random()-0.5) * 0.15;
        registerInteraction(5);
      }
    };
    this.el.addEventListener('pointerup', endDrag);
    this.el.addEventListener('pointercancel', endDrag);
  }

  poke(){
    this.playAnim('anim-poke');
    this.say(randomFrom(this.data.pokeLines));
    registerInteraction(8);
  }

  playAnim(cls){
    ANIMS.concat(['anim-poke']).forEach(c => this.actor.classList.remove(c));
    void this.actor.offsetWidth;
    this.actor.classList.add(cls);
    this.lastAnimAt = performance.now();
  }

  idleBeat(){
    const pool = this.data.weightedActions.concat(this.data.weightedActions).concat(ANIMS);
    this.playAnim(randomFrom(pool));
    if(Math.random() < 0.7){
      this.say(randomFrom(this.data.idleLines));
    }
  }

  render(){
    this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
    if(this.vx !== 0){
      this.actor.style.transform2 = null;
      this.actor.style.setProperty('--facing', this.vx < 0 ? '-1' : '1');
      this.el.style.transform += ` `; // no-op keeps chain stable
      this.actor.querySelector('img').style.transform = `scaleX(${this.vx < 0 ? -1 : 1})`;
    }
  }

  tick(now, dt){
    if(this.dragging || !this.active) return;

    if(now > this.nextDirChange){
      this.vx = (Math.random()-0.5) * 0.2;
      this.vy = (Math.random()-0.5) * 0.2;
      this.nextDirChange = now + 1500 + Math.random()*2500;
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    const maxX = stageW() - this.el.offsetWidth;
    const minY = TOP_SAFE;
    const maxY = stageH() - BOTTOM_SAFE - this.el.offsetHeight;
    if(this.x < 0){ this.x = 0; this.vx *= -1; }
    if(this.x > maxX){ this.x = maxX; this.vx *= -1; }
    if(this.y < minY){ this.y = minY; this.vy *= -1; }
    if(this.y > maxY){ this.y = maxY; this.vy *= -1; }

    if(now > this.nextIdleBeat){
      this.idleBeat();
      this.nextIdleBeat = now + 4000 + Math.random()*5000;
    }

    this.render();
  }
}

function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

const fruits = CAST.map((data,i) => new Fruit(data, i));

/* ---------- rotating cast scheduler ----------
   Only a couple of fruits are onstage at once so it stays calm, not chaotic.
   Fruits take turns appearing/disappearing on their own timers. */
const MAX_ONSTAGE = 4;
let onstageIds = new Set();

function bringSomeoneOnstage(){
  if(onstageIds.size >= MAX_ONSTAGE) return;
  const offstage = fruits.filter(f => !onstageIds.has(f.data.id));
  if(offstage.length === 0) return;
  const chosen = randomFrom(offstage);
  onstageIds.add(chosen.data.id);
  chosen.enter();
}

function sendSomeoneOffstage(){
  if(onstageIds.size === 0) return;
  const activeFruits = fruits.filter(f => onstageIds.has(f.data.id) && !f.dragging);
  if(activeFruits.length === 0) return;
  const chosen = randomFrom(activeFruits);
  onstageIds.delete(chosen.data.id);
  chosen.exit();
}

function runCastScheduler(){
  // bring the first batch on with a short stagger
  for(let i=0;i<MAX_ONSTAGE;i++){
    setTimeout(bringSomeoneOnstage, i*700);
  }

  // periodically rotate: someone leaves, a bit later someone new arrives
  setInterval(()=>{
    if(onstageIds.size >= 1) sendSomeoneOffstage();
    setTimeout(bringSomeoneOnstage, 1500 + Math.random()*1500);
  }, 9000 + Math.random()*6000);
}
runCastScheduler();

/* ---------- Van Gogh entity ---------- */
class Painter{
  constructor(){
    this.el = document.createElement('div');
    this.el.className = 'vangogh-pos bob';

    this.inner = document.createElement('div');
    this.inner.className = 'vg-inner';
    this.inner.style.width = '100%';
    this.inner.style.height = '100%';

    this.img = document.createElement('img');
    this.img.src = VANGOGH.painting;
    this.img.draggable = false;
    this.inner.appendChild(this.img);
    this.el.appendChild(this.inner);

    this.bubble = document.createElement('div');
    this.bubble.className = 'vg-bubble';
    this.el.appendChild(this.bubble);

    stage.appendChild(this.el);

    this.anchorX = 24;
    this.anchorY = stageH() - BOTTOM_SAFE - 244;
    this.x = this.anchorX; this.y = this.anchorY;
    this.busy = false;
    this.dragging = false;
    this.bubbleTimer = null;
    this.bindEvents();
    this.render();
    this.nextBeat = performance.now() + 4000 + Math.random()*4000;
  }
  render(){ this.el.style.transform = `translate(${this.x}px,${this.y}px)`; }

  setPose(src){ this.img.src = src; }

  bindEvents(){
    let downX=0, downY=0, moved=false, offsetX=0, offsetY=0;

    this.el.addEventListener('pointerdown', (e)=>{
      this.el.setPointerCapture(e.pointerId);
      this.dragging = true;
      moved = false;
      this.el.classList.add('dragging');
      const rect = stage.getBoundingClientRect();
      downX = e.clientX; downY = e.clientY;
      offsetX = e.clientX - rect.left - this.x;
      offsetY = e.clientY - rect.top - this.y;
    });

    this.el.addEventListener('pointermove', (e)=>{
      if(!this.dragging) return;
      if(Math.abs(e.clientX-downX) > 4 || Math.abs(e.clientY-downY) > 4) moved = true;
      const rect = stage.getBoundingClientRect();
      this.x = clamp(e.clientX - rect.left - offsetX, 0, stageW()-this.el.offsetWidth);
      this.y = clamp(e.clientY - rect.top - offsetY, TOP_SAFE, stageH()-BOTTOM_SAFE-this.el.offsetHeight);
      this.render();
    });

    const endDrag = ()=>{
      if(!this.dragging) return;
      this.dragging = false;
      this.el.classList.remove('dragging');
      if(!moved){
        this.poke();
      } else {
        this.el.classList.add('flinch');
        this.say(randomFrom(VANGOGH.pokeLines));
        setTimeout(()=>this.el.classList.remove('flinch'), 500);
        // wherever he's dropped becomes his new home base
        this.anchorX = this.x;
        this.anchorY = this.y;
        registerInteraction(5);
      }
    };
    this.el.addEventListener('pointerup', endDrag);
    this.el.addEventListener('pointercancel', endDrag);
  }

  poke(){
    if(this.busy) return;
    this.el.classList.add('flinch');
    this.say(randomFrom(VANGOGH.pokeLines));
    setTimeout(()=>this.el.classList.remove('flinch'), 500);
    registerInteraction(8);
  }

  say(text, ms=5000){
    this.bubble.textContent = text;
    this.bubble.classList.add('show');
    this.el.classList.add('talk');
    clearTimeout(this.bubbleTimer);
    this.bubbleTimer = setTimeout(()=>{
      this.bubble.classList.remove('show');
      this.el.classList.remove('talk');
    }, ms);
  }

  idleMusing(){
    if(this.busy) return;
    this.setPose(VANGOGH.staring);
    this.say(randomFrom(VANGOGH.idleLines));
    setTimeout(()=>{ if(!this.busy) this.setPose(VANGOGH.painting); }, 1800);
  }

  flinch(){
    if(this.busy || this.dragging) return;
    this.el.classList.add('flinch');
    this.say(randomFrom(VANGOGH.flinchLines), 1600);
    setTimeout(()=>{
      this.setPose(VANGOGH.splat);
      this.say(randomFrom(VANGOGH.splatLines));
    }, 350);
    setTimeout(()=>{
      this.el.classList.remove('flinch');
      this.setPose(VANGOGH.painting);
    }, 1250);
  }

  chaseBeret(){
    if(this.busy) return;
    this.busy = true;
    this.setPose(VANGOGH.beret);
    this.say(randomFrom(VANGOGH.beretLines));
    const startX = this.x, startY = this.y;
    const targetX = clamp(this.x + (Math.random()>0.5 ? 90 : -90), 0, stageW()-this.el.offsetWidth);
    const targetY = clamp(this.y - 20, TOP_SAFE, stageH()-BOTTOM_SAFE-this.el.offsetHeight);
    const t0 = performance.now();
    const dur = 1400;
    const step = (now)=>{
      const p = Math.min(1, (now-t0)/dur);
      this.x = startX + (targetX-startX)*p;
      this.y = startY + (targetY-startY)*p;
      this.render();
      if(p<1) requestAnimationFrame(step);
      else {
        setTimeout(()=>{
          const back0 = performance.now();
          const bx = this.x, by = this.y;
          const stepBack = (now2)=>{
            const p2 = Math.min(1, (now2-back0)/dur);
            this.x = bx + (this.anchorX-bx)*p2;
            this.y = by + (this.anchorY-by)*p2;
            this.render();
            if(p2<1) requestAnimationFrame(stepBack);
            else { this.setPose(VANGOGH.painting); this.busy = false; }
          };
          requestAnimationFrame(stepBack);
        }, 500);
      }
    };
    requestAnimationFrame(step);
  }

  tick(now){
    if(this.dragging) return;
    if(now > this.nextBeat){
      const roll = Math.random();
      if(roll < 0.45) this.idleMusing();
      else if(roll < 0.7) this.chaseBeret();
      this.nextBeat = now + 5000 + Math.random()*5000;
    }
    this.render();
  }
}
const painter = new Painter();

/* collision check (light-touch, cooldown based) */
let lastCollisionAt = 0;
function checkCollisions(now){
  if(now - lastCollisionAt < 1500) return;
  const onstage = fruits.filter(f => f.active && !f.dragging);
  for(let i=0;i<onstage.length;i++){
    for(let j=i+1;j<onstage.length;j++){
      const a = onstage[i], b = onstage[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 50){
        a.playAnim(randomFrom(a.data.weightedActions));
        b.playAnim(randomFrom(b.data.weightedActions));
        b.say(randomFrom(b.data.pokeLines));
        a.vx *= -1; a.vy *= -1; b.vx *= -1; b.vy *= -1;
        lastCollisionAt = now;
        if(Math.random() < 0.5) setTimeout(()=>painter.flinch(), 300);
        return;
      }
    }
  }
  // occasional proximity flinch if a fruit wanders near the painter
  for(const f of onstage){
    const dx = f.x - painter.x, dy = f.y - painter.y;
    if(Math.sqrt(dx*dx+dy*dy) < 55 && Math.random() < 0.02){
      painter.flinch();
      lastCollisionAt = now;
      break;
    }
  }
}

/* main loop */
let lastTime = performance.now();
function loop(now){
  const dt = Math.min(40, now - lastTime);
  lastTime = now;
  fruits.forEach(f => f.tick(now, dt));
  painter.tick(now);
  checkCollisions(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---------- persistence ---------- */
function loadHistory(){
  try{
    const raw = localStorage.getItem('fruit_salad_chat_history');
    if(raw){ history = JSON.parse(raw); return true; }
  }catch(e){}
  history = [];
  return false;
}
function saveHistory(){
  try{ localStorage.setItem('fruit_salad_chat_history', JSON.stringify(history)); }catch(e){}
}

function addBubble(sender, text){
  const b = document.createElement('div');
  b.className = 'bubble ' + (sender === 'her' ? 'her' : 'fruit');
  b.textContent = text;
  chatLog.appendChild(b);
  chatLog.scrollTop = chatLog.scrollHeight;
}

/* ---------- AI call (proxy not built yet — falls back safely) ---------- */
async function callFruitAPI(conversation, instruction){
  try{
    const res = await fetch('/api/fruit-salad', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ instruction, herName: HER_NAME, history: conversation })
    });
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    return data.reply || randomFrom(FALLBACK_LINES);
  }catch(e){
    return randomFrom(FALLBACK_LINES);
  }
}

async function sendMessage(){
  const text = msgInput.value.trim();
  if(!text) return;
  msgInput.value = '';

  addBubble('her', text);
  history.push({role:'her', content:text});
  saveHistory();
  registerInteraction(10);

  // onstage fruits "snap to attention"
  fruits.filter(f=>f.active).forEach(f => f.playAnim('anim-flex'));
  typingEl.textContent = 'someone is typing...';

  let reply;
  if(Math.random() < 0.5 && ROAST_LINES.length){
    reply = randomFrom(ROAST_LINES);
    await new Promise(r=>setTimeout(r, 500));
  } else {
    reply = await callFruitAPI(
      history.slice(-10),
      `Respond to what ${HER_NAME} just said, in the voice of the tiny Van Gogh painter character. Your DEFAULT mode is sassy and roasting — witty, a little dramatic, artistic, teasing her rather than being sweet. One to two short sentences, address her by name sometimes, avoid the word "love".`
    );
  }

  typingEl.textContent = '';
  painter.setPose(VANGOGH.staring);
  painter.say(reply, 5000);
  setTimeout(()=>{ if(!painter.busy) painter.setPose(VANGOGH.painting); }, 4600);
  addBubble('fruit', reply);
  history.push({role:'fruit', content:reply});
  saveHistory();
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

/* ---------- quick reply buttons ---------- */
const quickRepliesEl = document.getElementById('quickReplies');
QUICK_REPLIES.forEach(text => {
  const btn = document.createElement('button');
  btn.className = 'qr-btn';
  btn.type = 'button';
  btn.textContent = text;
  btn.addEventListener('click', ()=>{
    msgInput.value = text;
    sendMessage();
  });
  quickRepliesEl.appendChild(btn);
});

/* ---------- init ---------- */
function init(){
  const hadHistory = loadHistory();
  history.forEach(m => addBubble(m.role === 'her' ? 'her' : 'fruit', m.content));

  if(hadHistory && history.length){
    painter.say(randomFrom(WELCOME_BACK_LINES), 5000);
  } else {
    const greeting = randomFrom(FIRST_GREETINGS);
    painter.say(greeting, 5000);
    history.push({role:'fruit', content:greeting});
    saveHistory();
  }
}
init();
